<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Gaismas AUTO-OFP</title>
    <style>
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial;
        }
        .card {
            background: #0f0f23;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: white;
            width: 350px;
        }
        .light {
            font-size: 80px;
            margin: 20px;
            transition: 0.2s;
        }
        .light-off { filter: grayscale(1); opacity: 0.5; }
        .light-on { text-shadow: 0 0 30px #ffcc00; }
        .sensor-area {
            background: #2a2a4a;
            padding: 30px;
            border-radius: 15px;
            margin: 15px 0;
            cursor: pointer;
        }
        .manual-btn {
            background: #ff6b6b;
            border: none;
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 0;
        }
        .timer {
            background: #333;
            height: 8px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .timer-fill {
            background: #ffcc00;
            width: 0%;
            height: 8px;
            border-radius: 4px;
            transition: width 0.1s;
        }
        .log {
            background: #000;
            height: 100px;
            overflow-y: auto;
            font-size: 11px;
            padding: 8px;
            text-align: left;
            font-family: monospace;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>💡 Gaismas AUTO-OFP</h2>
    <div class="light light-off" id="light">💡</div>
    <div id="lightText">GAISMA IZSLĒGTA</div>

    <div class="sensor-area" id="motionZone">
        🖱️ KUSTĪBAS ZONA<br>
        <small>(bīdi peli šeit)</small>
        <div id="motionBadge" style="margin-top:10px;">⚪ NAV KUSTĪBAS</div>
    </div>

    <button class="manual-btn" id="manualBtn">🔘 MANUĀLI IESLĒGT (10s)</button>

    <div>⏱️ Taimeris: <span id="timerSec">0.0</span> s</div>
    <div class="timer"><div class="timer-fill" id="timerFill"></div></div>

    <div class="log" id="log"></div>
    <div style="font-size:10px; margin-top:10px;">Autors: Individuāls projekts</div>
</div>

<script>
    let lightOn = false, manual = false, lastMotion = Date.now();
    let timer = null;
    const DELAY = 10;

    function log(msg) {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
        while(logDiv.children.length > 20) logDiv.removeChild(logDiv.firstChild);
    }

    function setLight(state) {
        if(lightOn === state) return;
        lightOn = state;
        const lightDiv = document.getElementById('light');
        const textDiv = document.getElementById('lightText');
        if(state) {
            lightDiv.className = 'light light-on';
            textDiv.innerText = '💡 GAISMA IESLĒGTA';
            log('Gaisma IESLĒGTA');
        } else {
            lightDiv.className = 'light light-off';
            textDiv.innerText = '💡 GAISMA IZSLĒGTA';
            log('Gaisma IZSLĒGTA');
        }
    }

    function updateTimer() {
        if(!lightOn && !manual) {
            document.getElementById('timerSec').innerText = '0.0';
            document.getElementById('timerFill').style.width = '0%';
            return;
        }
        let elapsed = (Date.now() - lastMotion) / 1000;
        let left = Math.max(0, DELAY - elapsed);
        document.getElementById('timerSec').innerText = left.toFixed(1);
        document.getElementById('timerFill').style.width = (left/DELAY)*100 + '%';
        
        if(left <= 0.01 && !manual && lightOn) {
            setLight(false);
            if(timer) clearInterval(timer);
            timer = null;
            log('Automātiska izslēgšana pēc 10s');
        }
    }

    function startTimer() {
        if(timer) clearInterval(timer);
        timer = setInterval(updateTimer, 100);
    }

    function motion() {
        if(manual) {
            lastMotion = Date.now();
            startTimer();
            return;
        }
        if(!lightOn) setLight(true);
        lastMotion = Date.now();
        startTimer();
        
        // vizuāla atgriezeniskā saite
        document.getElementById('motionBadge').innerHTML = '🟢 KUSTĪBA ATKLĀTA';
        setTimeout(() => {
            if(!manual) document.getElementById('motionBadge').innerHTML = '⚪ NAV KUSTĪBAS';
        }, 300);
        log('Kustība atklāta');
    }

    function manualOverride() {
        manual = true;
        setLight(true);
        lastMotion = Date.now();
        startTimer();
        log('🔘 Manuāli ieslēgts');
        setTimeout(() => {
            manual = false;
            document.getElementById('motionBadge').innerHTML = '⚪ NAV KUSTĪBAS';
            log('Manuālais režīms beidzies');
            let elapsed = (Date.now() - lastMotion)/1000;
            if(elapsed >= DELAY && lightOn) setLight(false);
            else if(lightOn) startTimer();
        }, 10000);
    }

    // Notikumi
    const zone = document.getElementById('motionZone');
    zone.onmouseenter = motion;
    zone.onmousemove = motion;
    zone.onclick = motion;
    document.getElementById('manualBtn').onclick = manualOverride;
    
    log('Sistēma startēta | Aizture: 10s');
</script>
</body>
</html>
